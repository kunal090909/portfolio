<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, minimum-scale=1.0, maximum-scale=5.0">
<title>Kunal's Portfolio</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #1a1a1a;
    font-family: 'Courier New', monospace;
    min-height: 100vh;
  }

  /* ── TOP BAR ── */
  #topbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 200;
    background: #000;
    border-bottom: 1px solid #333;
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 1.2rem;
    gap: 1rem;
  }
  #topbar .title {
    color: #fff;
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    white-space: nowrap;
  }
  #nav-controls {
    display: flex;
    align-items: center;
    gap: 0.6rem;
  }
  #nav-controls button {
    background: transparent;
    border: 1px solid #444;
    color: #fff;
    font-family: inherit;
    font-size: 0.7rem;
    padding: 0.25rem 0.7rem;
    cursor: pointer;
    letter-spacing: 0.08em;
    transition: border-color 0.15s, background 0.15s;
  }
  #nav-controls button:hover { border-color: #aaa; background: #111; }
  #nav-controls button:disabled { opacity: 0.3; cursor: default; }
  #page-info {
    color: #888;
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    white-space: nowrap;
  }

  @media (max-width: 767px) {
    #nav-controls { display: none; }
  }

  /* ── UPLOAD ZONE (shown before PDF is loaded) ── */
  #upload-zone {
    position: fixed;
    inset: 44px 0 0 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1.2rem;
    background: #111;
  }
  #upload-zone p {
    color: #555;
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.15em;
  }
  #upload-zone label {
    border: 1px solid #444;
    color: #ccc;
    font-family: inherit;
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    padding: 0.5rem 1.4rem;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  #upload-zone label:hover { border-color: #aaa; }
  #file-input { display: none; }

  /* ── VIEWER ── */
  #viewer {
    display: none;
    padding-top: 44px;
    -webkit-overflow-scrolling: touch;
  }

  /* Each page = relative container so overlays can be absolute inside */
  .page-wrapper {
    position: relative;
    margin: 0 auto;
    display: block;
    will-change: transform;
  }
  .page-wrapper canvas {
    display: block;
    width: 100%;
    height: auto;
  }

  /* separator between pages */
  .page-sep {
    height: 16px;
    background: #1a1a1a;
  }

  /* ── VIDEO OVERLAY ── */
  .vid-overlay {
    position: absolute;
    background: #000;
    overflow: hidden;
  }
  .vid-overlay iframe {
    width: 100%;
    height: 100%;
    display: block;
    border: none;
  }
  /* placeholder shown until user pastes URL */
  .vid-overlay .placeholder {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 8px;
    background: #000;
  }
  .vid-overlay .placeholder .icon {
    width: 36px; height: 36px;
    border: 1.5px solid rgba(255,255,255,0.35);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .vid-overlay .placeholder .icon::after {
    content: '';
    border-left: 12px solid #fff;
    border-top: 7px solid transparent;
    border-bottom: 7px solid transparent;
    margin-left: 3px;
  }
  .vid-overlay .placeholder .lbl {
    color: rgba(255,255,255,0.35);
    font-size: 0.55rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    text-align: center;
  }
  .vid-overlay .placeholder input {
    width: 88%;
    background: transparent;
    border: 1px solid rgba(255,255,255,0.2);
    color: #fff;
    font-family: 'Courier New', monospace;
    font-size: 0.6rem;
    padding: 3px 6px;
    text-align: center;
    outline: none;
  }
  .vid-overlay .placeholder input:focus { border-color: rgba(255,255,255,0.6); }
  .vid-overlay .placeholder button {
    background: transparent;
    border: 1px solid rgba(255,255,255,0.3);
    color: #fff;
    font-family: 'Courier New', monospace;
    font-size: 0.55rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    padding: 2px 10px;
    cursor: pointer;
  }
  .vid-overlay .placeholder button:hover { background: rgba(255,255,255,0.08); }

  /* hide placeholder inputs on tiny overlays */
  .vid-overlay.compact .placeholder input,
  .vid-overlay.compact .placeholder button {
    display: none;
  }
  .vid-overlay.compact .placeholder .lbl { display: none; }
  .vid-overlay.compact { cursor: pointer; }

  /* loading spinner */
  #loading {
    display: none;
    position: fixed;
    inset: 44px 0 0 0;
    background: #111;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 1rem;
    color: #555;
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    z-index: 50;
  }
  #loading.active { display: flex; }
  .spinner {
    width: 28px; height: 28px;
    border: 2px solid #333;
    border-top-color: #888;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── CONTACT LINKS OVERLAY (page 12) ── */
  .link-overlay {
    position: absolute;
    bottom: 22%;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 1.2rem;
    z-index: 10;
  }
  .contact-btn {
    color: #fff;
    text-decoration: none;
    font-family: 'Courier New', monospace;
    font-size: clamp(0.6rem, 1.4vw, 0.85rem);
    text-transform: uppercase;
    letter-spacing: 0.15em;
    border: 1px solid rgba(255,255,255,0.5);
    padding: 0.45em 1.1em;
    transition: background 0.2s, border-color 0.2s;
    white-space: nowrap;
  }
  .contact-btn:hover {
    background: rgba(255,255,255,0.12);
    border-color: #fff;
  }
</style>
</head>
<body>

<!-- TOP BAR -->
<div id="topbar">
  <span class="title">Kunal's Portfolio</span>
  <div id="nav-controls">
    <button id="btn-prev" disabled onclick="changePage(-1)">← Prev</button>
    <span id="page-info">— / —</span>
    <button id="btn-next" disabled onclick="changePage(1)">Next →</button>
  </div>
</div>

<input type="file" id="file-input" accept=".pdf" style="display:none">

<!-- UPLOAD PROMPT (fallback only) -->
<div id="upload-zone">
  <p>Loading portfolio…</p>
</div>

<!-- LOADING -->
<div id="loading"><div class="spinner"></div><span>Rendering pages…</span></div>

<!-- VIEWER -->
<div id="viewer"></div>

<script>
// ─── PDF.js worker ───────────────────────────────────────────────
pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

// ─── STATE ───────────────────────────────────────────────────────
let pdfDoc      = null;
let totalPages  = 0;
let currentPage = 1;
let scale       = 3.0;   // high-res render — crisp on retina/HD screens
let pageWrappers = [];   // DOM nodes, one per page
let videoData   = {};    // { 'p8-v1': 'ytId', ... }

// ─── VIDEO SLOT DEFINITIONS ──────────────────────────────────────
// Positions are fractions of the rendered canvas (width/height).
// Measured from the actual PDF pages.
//
// PAGE 8 — Ruxie (landscape grid, 3 cols × 2 rows)
//   Grid: left~2.5%, right~97.5%, top~7%, bottom~93%
//   Col splits at ~35% and ~65% of page width
//   Row split at ~50% of page height
//   Videos: row1-col2 (top centre), row2-col1 (bottom left), row2-col3 (bottom right)
//
// PAGE 11 — Commissioned Content (landscape grid, 3 cols)
//   Grid: left~3.5%, right~96.5%, top~12%, bottom~88%
//   Col splits at ~31% and ~69%
//   Centre col: top half = title+text, bottom half = video
//   Left & right = full height videos

const VIDEO_SLOTS = {
  // ── PAGE 7: Ruxie ──────────────────────────────────────────────
  // Replace the url: '' values below with your YouTube links
  '7-v1': { top: 0.115, left: 0.361, width: 0.278, height: 0.370, url: '' },  // Ruxie — top centre
  '7-v2': { top: 0.515, left: 0.064, width: 0.278, height: 0.370, url: '' },  // Ruxie — bottom left
  '7-v3': { top: 0.515, left: 0.659, width: 0.277, height: 0.370, url: '' },  // Ruxie — bottom right

  // ── PAGE 11: Commissioned Content ──────────────────────────────
  // Replace the url: '' values below with your YouTube links
  '11-v1': { top: 0.157, left: 0.048, width: 0.217, height: 0.686, url: '' }, // Commissioned — tall left
  '11-v2': { top: 0.406, left: 0.280, width: 0.441, height: 0.437, url: '' }, // Commissioned — centre
  '11-v3': { top: 0.157, left: 0.736, width: 0.217, height: 0.686, url: '' }, // Commissioned — tall right
};

const SLOT_LABELS = {
  '7-v1':  'Ruxie — Visualizer 1 (top centre)',
  '7-v2':  'Ruxie — Visualizer 2 (bottom left)',
  '7-v3':  'Ruxie — Visualizer 3 (bottom right)',
  '11-v1': 'Commissioned — Video 1 (left)',
  '11-v2': 'Commissioned — Video 2 (centre)',
  '11-v3': 'Commissioned — Video 3 (right)',
};

// Which pages have video slots (1-indexed)
const VIDEO_PAGES = new Set([7, 11]);

// ─── YT ID EXTRACTOR ────────────────────────────────────────────
function extractYTId(url) {
  url = (url || '').trim();
  let m;
  m = url.match(/[?&]v=([a-zA-Z0-9_-]{11})/); if (m) return m[1];
  m = url.match(/youtu\.be\/([a-zA-Z0-9_-]{11})/); if (m) return m[1];
  m = url.match(/embed\/([a-zA-Z0-9_-]{11})/); if (m) return m[1];
  m = url.match(/shorts\/([a-zA-Z0-9_-]{11})/); if (m) return m[1];
  if (/^[a-zA-Z0-9_-]{11}$/.test(url)) return url;
  return null;
}

// ─── LOAD VIDEO INTO SLOT ────────────────────────────────────────
function loadVideoSlot(slotKey, url) {
  const ytId = extractYTId(url);
  if (!ytId) return false;
  videoData[slotKey] = ytId;

  // find the overlay div for this slot
  const overlay = document.querySelector(`.vid-overlay[data-slot="${slotKey}"]`);
  if (!overlay) return true;

  const ph = overlay.querySelector('.placeholder');
  ph.style.display = 'none';

  // remove old iframe if any
  const old = overlay.querySelector('iframe');
  if (old) old.remove();

  const iframe = document.createElement('iframe');
  iframe.src = `https://www.youtube.com/embed/${ytId}?rel=0&modestbranding=1`;
  iframe.allow = 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture';
  iframe.allowFullscreen = true;
  overlay.appendChild(iframe);
  return true;
}

// ─── CREATE OVERLAY FOR A SLOT ──────────────────────────────────
function createOverlay(slotKey, displayW, displayH) {
  const s = VIDEO_SLOTS[slotKey];
  const div = document.createElement('div');
  div.className = 'vid-overlay';
  div.dataset.slot = slotKey;

  div.style.cssText = `
    left:   ${(displayW * s.left).toFixed(1)}px;
    top:    ${(displayH * s.top).toFixed(1)}px;
    width:  ${(displayW * s.width).toFixed(1)}px;
    height: ${(displayH * s.height).toFixed(1)}px;
  `;

  // auto-load from hardcoded url
  const ytId = extractYTId(s.url);
  if (ytId) {
    videoData[slotKey] = ytId;
    const iframe = document.createElement('iframe');
    iframe.src = `https://www.youtube.com/embed/${ytId}?rel=0&modestbranding=1`;
    iframe.allow = 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture';
    iframe.allowFullscreen = true;
    div.appendChild(iframe);
  }
  // if no url set yet, overlay stays black (invisible to viewer — just covers the black box)

  return div;
}

// ─── RENDER A SINGLE PAGE ───────────────────────────────────────
async function renderPage(pageNum) {
  const page = await pdfDoc.getPage(pageNum);

  // 3x render for sharp quality — pinch zoom handled natively by browser
  const dpr = Math.min(window.devicePixelRatio || 1, 3);
  const vw  = document.documentElement.clientWidth;
  const baseViewport = page.getViewport({ scale: 1 });
  const fitScale = (vw / baseViewport.width) * dpr;
  const viewport = page.getViewport({ scale: fitScale });

  const wrapper = document.createElement('div');
  wrapper.className = 'page-wrapper';
  wrapper.dataset.page = pageNum;
  // display width = viewport width, height proportional
  wrapper.style.width  = vw + 'px';
  wrapper.style.height = (vw * baseViewport.height / baseViewport.width) + 'px';

  const canvas = document.createElement('canvas');
  canvas.width  = viewport.width;
  canvas.height = viewport.height;
  // CSS size = display size (vw wide)
  canvas.style.width  = '100%';
  canvas.style.height = '100%';

  const ctx = canvas.getContext('2d');
  await page.render({ canvasContext: ctx, viewport }).promise;

  wrapper.appendChild(canvas);

  // overlay positions use display (CSS) dimensions, not canvas pixel dims
  const displayW = vw;
  const displayH = vw * baseViewport.height / baseViewport.width;

  // add video overlays for this page
  const pageSlots = Object.keys(VIDEO_SLOTS).filter(k => k.startsWith(pageNum + '-'));
  pageSlots.forEach(slotKey => {
    const ov = createOverlay(slotKey, displayW, displayH);
    wrapper.appendChild(ov);
  });

  // add contact links overlay on Thank You page (page 12)
  if (pageNum === 12) {
    const linkOverlay = document.createElement('div');
    linkOverlay.className = 'link-overlay';

    const emailBtn = document.createElement('a');
    emailBtn.href = 'https://mail.google.com/mail/?view=cm&to=kunalnihalanni@gmail.com';
    emailBtn.target = '_blank';
    emailBtn.rel = 'noopener noreferrer';
    emailBtn.className = 'contact-btn';
    emailBtn.textContent = '✉ Email Me';

    const igBtn = document.createElement('a');
    igBtn.href = 'https://instagram.com/__kun41';
    igBtn.target = '_blank';
    igBtn.rel = 'noopener noreferrer';
    igBtn.className = 'contact-btn';
    igBtn.textContent = '↗ Instagram';

    linkOverlay.appendChild(emailBtn);
    linkOverlay.appendChild(igBtn);
    wrapper.appendChild(linkOverlay);
  }

  return wrapper;
}

// ─── RENDER ALL PAGES ───────────────────────────────────────────
async function renderAll() {
  const viewer = document.getElementById('viewer');
  viewer.innerHTML = '';
  pageWrappers = [];

  for (let i = 1; i <= totalPages; i++) {
    const wrapper = await renderPage(i);
    viewer.appendChild(wrapper);
    pageWrappers.push(wrapper);

    if (i < totalPages) {
      const sep = document.createElement('div');
      sep.className = 'page-sep';
      viewer.appendChild(sep);
    }
  }
}

// ─── PAGE NAVIGATION (scrolls to page) ──────────────────────────
function changePage(delta) {
  const next = currentPage + delta;
  if (next < 1 || next > totalPages) return;
  currentPage = next;
  updateNav();
  pageWrappers[currentPage - 1]?.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function updateNav() {
  document.getElementById('page-info').textContent = `${currentPage} / ${totalPages}`;
  document.getElementById('btn-prev').disabled = currentPage <= 1;
  document.getElementById('btn-next').disabled = currentPage >= totalPages;
}

// track current page via IntersectionObserver
function setupScrollObserver() {
  const io = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        currentPage = parseInt(e.target.dataset.page);
        updateNav();
      }
    });
  }, { threshold: 0.4 });

  pageWrappers.forEach(w => io.observe(w));
}

// ─── SHARED INIT AFTER PDF IS READY ─────────────────────────────
async function initViewer() {
  totalPages = pdfDoc.numPages;
  await renderAll();
  document.getElementById('loading').classList.remove('active');
  document.getElementById('viewer').style.display = 'block';
  document.getElementById('btn-prev').disabled = false;
  document.getElementById('btn-next').disabled = false;
  updateNav();
  setupScrollObserver();
  window.scrollTo(0, 0);
}

// ─── AUTO-LOAD PDF FROM SAME FOLDER ─────────────────────────────
const PDF_FILENAME = 'portfolionovideo.pdf';

async function autoLoadPDF() {
  try {
    document.getElementById('upload-zone').style.display = 'none';
    document.getElementById('loading').classList.add('active');
    document.getElementById('viewer').style.display = 'none';

    pdfDoc = await pdfjsLib.getDocument(PDF_FILENAME).promise;
    await initViewer();
  } catch (err) {
    // PDF not found (e.g. local file:// open without server) — show upload fallback
    document.getElementById('loading').classList.remove('active');
    document.getElementById('upload-zone').style.display = 'flex';
    console.warn('Auto-load failed, falling back to file picker.', err);
  }
}

// ─── FALLBACK: manual file pick ─────────────────────────────────
document.getElementById('file-input').addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file) return;

  document.getElementById('upload-zone').style.display = 'none';
  document.getElementById('loading').classList.add('active');
  document.getElementById('viewer').style.display = 'none';

  const arrayBuffer = await file.arrayBuffer();
  pdfDoc = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
  await initViewer();
});

// kick off
autoLoadPDF();

</script>
</body>
</html>
